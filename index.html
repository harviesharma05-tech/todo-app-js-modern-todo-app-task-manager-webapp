<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>✅ To-Do App</h1>

    <div class="input-box">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task..."
        >

        <button onclick="addTask()">
            Add
        </button>
    </div>

    <p id="taskCount">
        Total Tasks: 0
    </p>

    <button class="clear-btn"
        onclick="clearTasks()">
        Clear All
    </button>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
